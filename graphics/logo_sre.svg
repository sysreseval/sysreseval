<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <!-- Bright blue background — gives the icon a clear silhouette on any dark surface -->
  <rect width="64" height="64" rx="12" fill="#1565C0"/>

  <!-- Network connections (bold white lines, visible at any size) -->
  <line x1="32" y1="30" x2="13" y2="13" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="30" x2="51" y2="13" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="32" y1="30" x2="32" y2="52" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Peripheral machine nodes (rounded rectangles = hosts/routers) -->
  <rect x="4"  y="7"  width="18" height="12" rx="3" fill="white" opacity="0.9"/>
  <rect x="42" y="7"  width="18" height="12" rx="3" fill="white" opacity="0.9"/>
  <rect x="23" y="50" width="18" height="12" rx="3" fill="white" opacity="0.9"/>

  <!-- Central evaluation hub -->
  <circle cx="32" cy="30" r="11.5" fill="white"/>

  <!-- Checkmark: green, bold, occupies most of the hub -->
  <path d="M24.5,30.5 L29.5,35.5 L39.5,23.5"
        stroke="#2E7D32" stroke-width="4" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

</svg>
