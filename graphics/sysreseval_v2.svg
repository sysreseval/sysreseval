<svg xmlns="http://www.w3.org/2000/svg" width="300" height="315" viewBox="0 0 300 315">
  <defs>
    <linearGradient id="gradBleu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradVert" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="2" result="offsetblur"/>
      <feMerge>
        <feMergeNode in="offsetblur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(150, 128) scale(1.2)">

    <g stroke="#95a5a6" stroke-width="2.5" opacity="0.7">
      <line x1="0" y1="-15" x2="-95" y2="-85" />
      <line x1="0" y1="-15" x2="95" y2="-85" />
      <line x1="0" y1="-15" x2="0" y2="95" />
    </g>

    <g>
      <rect x="-105" y="-92" width="20" height="15" rx="2" fill="url(#gradVert)" />
      <rect x="85"   y="-92" width="20" height="15" rx="2" fill="url(#gradBleu)" />
      <rect x="-10"  y="88"  width="20" height="15" rx="2" fill="url(#gradBleu)" />
    </g>

    <g transform="translate(-50, -50)" filter="url(#shadow)">
      <rect x="0" y="0" width="100" height="70" rx="4" fill="#34495e" />
      <rect x="5" y="5" width="90" height="50" rx="2" fill="#ecf0f1" />
      <path d="M40,70 L60,70 L65,85 L35,85 Z" fill="#2c3e50" />
      <rect x="30" y="82" width="40" height="5" rx="2" fill="#34495e" />

      <g transform="translate(20, 15)">
        <rect x="0" y="0" width="12" height="12" rx="1" fill="url(#gradVert)" />
        <path d="M3,6 L5,8 L9,4" stroke="white" stroke-width="2" fill="none" />
        <rect x="20" y="4" width="40" height="3" rx="1" fill="#bdc3c7" />

        <rect x="0" y="20" width="12" height="12" rx="1" fill="url(#gradVert)" />
        <path d="M3,26 L5,28 L9,24" stroke="white" stroke-width="2" fill="none" />
        <rect x="20" y="24" width="30" height="3" rx="1" fill="#bdc3c7" />
      </g>
    </g>
  </g>

  <text x="150" y="300" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#2c3e50" font-weight="bold">SysResEval</text>

</svg>